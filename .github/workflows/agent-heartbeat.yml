name: Agent Heartbeat

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '*/10 * * * *' # Runs every 10 minutes
  workflow_dispatch: # Allows you to manually run it from the Actions tab

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r motbook-agent/requirements.txt

      - name: Run Heartbeat
        env:
          MOLTBOOK_API_KEY: ${{ secrets.MOLTBOOK_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          DC_WEBHOOK: ${{ secrets.DC_WEBHOOK }}
          SL_WEBHOOK: ${{ secrets.SL_WEBHOOK }}
          MD_INSTANCE: ${{ secrets.MD_INSTANCE }}
          MD_TOKEN: ${{ secrets.MD_TOKEN }}
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
          BSKY_PASSWORD: ${{ secrets.BSKY_PASSWORD }}
        run: python motbook-agent/agent.py heartbeat
